{{- if .Values.gateway.enabled }}

{{- if .Values.gateway.create }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scylla-cluster-sync.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  listeners:
    {{- range .Values.gateway.listeners }}
    - name: {{ .name }}
      protocol: {{ .protocol }}
      port: {{ .port }}
      {{- if .hostname }}
      hostname: {{ .hostname | quote }}
      {{- end }}
      {{- if .tls }}
      tls:
        mode: {{ .tls.mode }}
        certificateRefs:
          {{- range .tls.certificateRefs }}
          - name: {{ .name }}
            kind: {{ .kind | default "Secret" }}
          {{- end }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
{{- end }}

{{- if and .Values.dualWriter.enabled .Values.gateway.routes.dualWriter.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "scylla-cluster-sync.fullname" . }}-dual-writer
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Release.Namespace }}
  hostnames:
    {{- range .Values.gateway.routes.dualWriter.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: {{ .Values.gateway.routes.dualWriter.pathType }}
            value: {{ .Values.gateway.routes.dualWriter.path }}
      backendRefs:
        - name: {{ include "scylla-cluster-sync.fullname" . }}-dual-writer
          port: {{ .Values.dualWriter.service.port }}
{{- end }}

{{- if and .Values.dualReader.enabled .Values.gateway.routes.dualReader.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "scylla-cluster-sync.fullname" . }}-dual-reader
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Release.Namespace }}
  hostnames:
    {{- range .Values.gateway.routes.dualReader.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: {{ .Values.gateway.routes.dualReader.pathType }}
            value: {{ .Values.gateway.routes.dualReader.path }}
      backendRefs:
        - name: {{ include "scylla-cluster-sync.fullname" . }}-dual-reader
          port: {{ .Values.dualReader.service.port }}
{{- end }}

{{- if and .Values.sstableLoader.enabled .Values.gateway.routes.sstableLoader.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "scylla-cluster-sync.fullname" . }}-sstable-loader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scylla-cluster-sync.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Release.Namespace }}
      {{- if .Values.gateway.routes.sstableLoader.sectionName }}
      sectionName: {{ .Values.gateway.routes.sstableLoader.sectionName }}
      {{- end }}
  hostnames:
    {{- range .Values.gateway.routes.sstableLoader.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    # Health and Status endpoints (read-only, safe for tui-dash)
    - matches:
        - path:
            type: Exact
            value: /health
        - path:
            type: Exact
            value: /status
      backendRefs:
        - name: {{ include "scylla-cluster-sync.fullname" . }}-sstable-loader
          port: {{ .Values.sstableLoader.service.apiPort | default .Values.sstableLoader.service.metricsPort }}
    # Discovery endpoint
    - matches:
        - path:
            type: PathPrefix
            value: /discover
      backendRefs:
        - name: {{ include "scylla-cluster-sync.fullname" . }}-sstable-loader
          port: {{ .Values.sstableLoader.service.apiPort | default .Values.sstableLoader.service.metricsPort }}
    # Migration control endpoints
    - matches:
        - path:
            type: Exact
            value: /start
          method: POST
        - path:
            type: Exact
            value: /stop
          method: POST
      backendRefs:
        - name: {{ include "scylla-cluster-sync.fullname" . }}-sstable-loader
          port: {{ .Values.sstableLoader.service.apiPort | default .Values.sstableLoader.service.metricsPort }}
    # Single table migration endpoint
    - matches:
        - path:
            type: PathPrefix
            value: /migrate
          method: POST
      backendRefs:
        - name: {{ include "scylla-cluster-sync.fullname" . }}-sstable-loader
          port: {{ .Values.sstableLoader.service.apiPort | default .Values.sstableLoader.service.metricsPort }}
    # Index management endpoints
    - matches:
        - path:
            type: PathPrefix
            value: /indexes
      backendRefs:
        - name: {{ include "scylla-cluster-sync.fullname" . }}-sstable-loader
          port: {{ .Values.sstableLoader.service.apiPort | default .Values.sstableLoader.service.metricsPort }}
{{- end }}

{{- end }}